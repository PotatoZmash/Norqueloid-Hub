<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norqueloid Script Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    border-bottom: 2px solid #00ffcc;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,204,0.3);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffcc;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #00ffcc;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00ccaa;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    opacity: 0.7;
}
</style>
</head>

<body>

<header>Norqueloid Script Hub</header>

<div class="container">

<div class="card">
    <h3>Adopt Me Script</h3>
    <p>Auto Trade / Value Checker</p>
    <button onclick="copyScript('adopt')">Copy Script</button>
</div>

<div class="card">
    <h3>MM2 Script</h3>
    <p>ESP / Auto Farm</p>
    <button onclick="copyScript('mm2')">Copy Script</button>
</div>

<div class="card">
    <h3>Universal Script</h3>
    <p>Works on most games</p>
    <button onclick="copyScript('uni')">Copy Script</button>
</div>

</div>

<footer>© 2026 Norqueloid</footer>

<script>
function copyScript(type) {
    let script = "";

    if(type === 'adopt') {
        script = "loadstring(game:HttpGet('https://yourlink.com/adopt.lua'))()";
    }
    if(type === 'mm2') {
        script = "loadstring(game:HttpGet('https://yourlink.com/mm2.lua'))()";
    }
    if(type === 'uni') {
        script = "loadstring(game:HttpGet('https://yourlink.com/universal.lua'))()";
    }

    navigator.clipboard.writeText(script);
    alert('Script Copied!');
}
</script>

</body>
</html>
