<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norqueloid Script Hub</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #1a1200, #3a2600, #ffd700);
    background-size: 400% 400%;
    animation: goldFlow 10s ease infinite;
    color: white;
}

@keyframes goldFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    border-bottom: 2px solid gold;
    text-shadow: 0 0 10px gold, 0 0 20px #ffd700;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.5);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px gold;
}

h3 {
    text-shadow: 0 0 8px gold;
}

p {
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px gold;
}

button:hover {
    background: #ffd700;
    box-shadow: 0 0 20px gold;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    opacity: 0.8;
    text-shadow: 0 0 5px gold;
}
</style>
</head>

<body>

<header>Norqueloid Script Hub</header>

<div class="container">

<div class="card">
    <h3>MM2 Script</h3>
    <p>ESP / Auto Farm</p>
    <button onclick="copyScript()">Copy Script</button>
</div>

</div>

<footer>© 2026 Norqueloid</footer>

<script>
function copyScript() {
    const script = "loadstring(game:HttpGet('https://raw.githubusercontent.com/potatozmash/Norqueloid-Hub/main/mm2.lua'))()";
    navigator.clipboard.writeText(script);
    alert('Script Copied!');
}
</script>

</body>
</html>
