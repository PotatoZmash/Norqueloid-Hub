<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norqueloid Script Hub</title>

<!-- ✅ FAVICON (TAB LOGO) -->
<link rel="icon" type="image/png" href="https://yt3.googleusercontent.com/IwSUZDDApqR78JYoW-7iYTZg-GwSdwfPUdUf1aqGDSMGXyHIy6jfDVHk1OgERN8h1PCA4SuKhg=s900-c-k-c0x00ffffff-no-rj">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(135deg, #1a1200, #3a2600, #ffd700);
    background-size: 400% 400%;
    animation: goldFlow 10s ease infinite;
    color: white;
}

@keyframes goldFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

header {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    border-bottom: 2px solid gold;
    text-shadow: 0 0 10px gold, 0 0 20px #ffd700;
}

/* HEADER LOGO */
.header-logo {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    vertical-align: middle;
    margin-right: 10px;
    box-shadow: 0 0 10px gold;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.5);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px gold;
}

/* CARD LOGO */
.card-logo {
    width: 90px;
    height: 90px;
    object-fit: cover;
    margin-bottom: 10px;
    border-radius: 12px;
    box-shadow: 0 0 15px gold;
    transition: 0.3s;
}

.card-logo:hover {
    transform: scale(1.1);
    box-shadow: 0 0 25px gold;
}

h3 {
    text-shadow: 0 0 8px gold;
}

p {
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: gold;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px gold;
    transition: 0.2s;
}

button:hover {
    background: #ffd700;
    box-shadow: 0 0 20px gold;
}

footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    opacity: 0.8;
    text-shadow: 0 0 5px gold;
}

/* 🔥 POPUP */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: black;
    color: gold;
    padding: 12px 18px;
    border-radius: 10px;
    box-shadow: 0 0 15px gold;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<header>
    <img src="https://yt3.googleusercontent.com/IwSUZDDApqR78JYoW-7iYTZg-GwSdwfPUdUf1aqGDSMGXyHIy6jfDVHk1OgERN8h1PCA4SuKhg=s900-c-k-c0x00ffffff-no-rj" 
         class="header-logo">
    Norqueloid Script Hub
</header>

<div class="container">

<div class="card">
    <!-- CARD LOGO -->
    <img src="https://i1.sndcdn.com/artworks-uzx2mJ2Y5naA3Z2H-ejw3nQ-t500x500.jpg" 
         class="card-logo">

    <h3>MM2 Script</h3>
    <p>ESP / Auto Farm</p>
    <button onclick="copyScript(this)">Copy Script</button>
</div>

</div>

<footer>© 2026 Norqueloid</footer>

<!-- POPUP -->
<div id="toast" class="toast">Copied to clipboard ✅</div>

<script>
function copyScript(button) {
    const script = 'loadstring(game:HttpGet("https://raw.githubusercontent.com/PotatoZmash/MurderMystery2Luas/refs/heads/main/NorqueloidHub"))()';

    navigator.clipboard.writeText(script).then(() => {
        success(button);
    }).catch(() => {
        const textarea = document.createElement("textarea");
        textarea.value = script;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);

        success(button);
    });
}

function success(button) {
    showToast();
    button.innerText = "Copied ✅";
    setTimeout(() => button.innerText = "Copy Script", 2000);
}

function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}
</script>

</body>
</html>
